<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Table</title>
<style>
    :root {
        --bg: #0d1117;
        --table-green: #1b5e20;
        --table-outer: #4e342e;
        --gold: #c9a84c;
        --text: #e0e0e0;
        --btn-bg: #21262d;
        --btn-border: #30363d;
        --btn-hover: #2f3a4a;
        --accent: #58a6ff;
        --danger: #f85149;
        --success: #3fb950;
        --warning: #d2991d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: var(--bg);
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: var(--text);
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        user-select: none;
    }
    #canvas-container {
        flex: 1;
        position: relative;
        min-height: 0;
    }
    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    #hud {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        border: 1px solid var(--gold);
        border-radius: 12px;
        padding: 8px 20px;
        display: flex;
        gap: 24px;
        font-size: 14px;
        backdrop-filter: blur(10px);
    }
    .hud-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .hud-label { color: #888; }
    .hud-value { color: var(--gold); font-weight: bold; font-size: 16px; }
    #controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        align-items: center;
        background: rgba(0,0,0,0.8);
        padding: 12px 20px;
        border-radius: 16px;
        border: 1px solid #333;
        backdrop-filter: blur(10px);
    }
    #controls.hidden { display: none; }
    .btn {
        padding: 10px 22px;
        border-radius: 10px;
        border: 1px solid var(--btn-border);
        background: var(--btn-bg);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
    }
    .btn:hover { background: var(--btn-hover); border-color: #555; }
    .btn:active { transform: scale(0.96); }
    .btn.fold { color: var(--danger); border-color: var(--danger); }
    .btn.fold:hover { background: rgba(248,81,73,0.15); }
    .btn.check { color: var(--success); border-color: var(--success); }
    .btn.check:hover { background: rgba(63,185,80,0.15); }
    .btn.raise { color: var(--accent); border-color: var(--accent); }
    .btn.raise:hover { background: rgba(88,166,255,0.15); }
    .btn.allin { color: var(--warning); border-color: var(--warning); }
    .btn.allin:hover { background: rgba(210,153,29,0.15); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #raise-input {
        width: 70px;
        padding: 10px 8px;
        border-radius: 10px;
        border: 1px solid var(--accent);
        background: var(--btn-bg);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        text-align: center;
        outline: none;
    }
    #new-hand-btn {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 36px;
        border-radius: 14px;
        border: 2px solid var(--gold);
        background: rgba(201,168,76,0.15);
        color: var(--gold);
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        display: none;
        backdrop-filter: blur(10px);
        transition: all 0.2s;
    }
    #new-hand-btn:hover { background: rgba(201,168,76,0.3); }
    #new-hand-btn.show { display: block; }
    #status {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--gold);
        font-size: 16px;
        font-weight: 600;
        display: none;
    }
</style>
</head>
<body>
<div id="canvas-container">
    <canvas id="c"></canvas>
    <div id="hud">
        <div class="hud-item"><span class="hud-label">Phase</span><span class="hud-value" id="hud-phase">-</span></div>
        <div class="hud-item"><span class="hud-label">Pot</span><span class="hud-value" id="hud-pot">$0</span></div>
        <div class="hud-item"><span class="hud-label">Bet</span><span class="hud-value" id="hud-bet">$0</span></div>
    </div>
    <div id="controls" class="hidden">
        <button class="btn fold" id="btn-fold">Fold</button>
        <button class="btn check" id="btn-check">Check</button>
        <button class="btn raise" id="btn-call">Call</button>
        <button class="btn raise" id="btn-raise">Raise</button>
        <input type="number" id="raise-input" value="" placeholder="Amt">
        <button class="btn allin" id="btn-allin">All In</button>
    </div>
    <div id="status"></div>
    <button id="new-hand-btn">New Hand</button>
</div>

<script>
const CARD_W = 64, CARD_H = 92;
const CARD_R = 8;
const SUIT_SYMBOLS = { 'S': '\u2660', 'H': '\u2665', 'D': '\u2666', 'C': '\u2663' };
const SUIT_COLORS = { 'S': '#000', 'H': '#e74c3c', 'D': '#e74c3c', 'C': '#000' };

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let gameState = null;
let ws = null;
let connected = false;
let animCards = {}; // card animation states

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(devicePixelRatio, devicePixelRatio);
}

function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => { connected = true; console.log('Connected'); };
    ws.onclose = () => { connected = false; setTimeout(connect, 2000); };
    ws.onmessage = (e) => {
        gameState = JSON.parse(e.data);
        if (gameState.hand_over) {
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('new-hand-btn').classList.add('show');
        }
        updateUI();
        render();
    };
}

function send(msg) { if (ws && connected) ws.send(JSON.stringify(msg)); }

function updateUI() {
    const gs = gameState;
    if (!gs) return;

    document.getElementById('hud-phase').textContent = gs.phase.toUpperCase();
    document.getElementById('hud-pot').textContent = '$' + gs.pot;
    document.getElementById('hud-bet').textContent = '$' + gs.current_bet;

    const ctrl = document.getElementById('controls');
    const actions = gs.allowed_actions || [];

    if (actions.length === 0 || gs.current_player !== findYou(gs) || gs.hand_over) {
        ctrl.classList.add('hidden');
    } else {
        ctrl.classList.remove('hidden');
        const btnFold = document.getElementById('btn-fold');
        const btnCheck = document.getElementById('btn-check');
        const btnCall = document.getElementById('btn-call');
        const btnRaise = document.getElementById('btn-raise');
        const btnAllin = document.getElementById('btn-allin');
        const raiseInp = document.getElementById('raise-input');

        const has = (a) => actions.includes(a);
        btnFold.style.display = has('fold') ? '' : 'none';
        btnCheck.style.display = has('check') ? '' : 'none';
        btnCall.style.display = has('call') ? '' : 'none';
        btnRaise.style.display = has('raise') ? '' : 'none';
        raiseInp.style.display = has('raise') ? '' : 'none';
        btnAllin.style.display = has('allin') ? '' : 'none';

        if (has('call')) {
            const you = gs.players.find(p => p.is_you);
            const callAmt = gs.current_bet - (you ? you.bet : 0);
            btnCall.textContent = `Call $${callAmt}`;
        }
        if (has('check') && !has('call')) {
            btnCheck.textContent = 'Check';
        }

        if (has('raise') && !raiseInp.value) {
            raiseInp.value = gs.min_raise || '';
        }
    }
}

function findYou(gs) {
    const p = gs.players.find(p => p.is_you);
    return p ? p.index : -1;
}

function sendAction(action, amount) {
    send({ action, amount: amount || 0 });
    document.getElementById('controls').classList.add('hidden');
}

document.getElementById('btn-fold').onclick = () => sendAction('fold');
document.getElementById('btn-check').onclick = () => sendAction('check');
document.getElementById('btn-call').onclick = () => sendAction('call');
document.getElementById('btn-raise').onclick = () => {
    const amt = parseInt(document.getElementById('raise-input').value) || 0;
    sendAction('raise', amt);
};
document.getElementById('btn-allin').onclick = () => sendAction('allin');
document.getElementById('new-hand-btn').onclick = () => {
    send({ type: 'new_hand' });
    document.getElementById('new-hand-btn').classList.remove('show');
};

// --- Canvas Drawing ---

const TABLE_CENTER_X = () => canvas.width / devicePixelRatio / 2;
const TABLE_CENTER_Y = () => canvas.height / devicePixelRatio / 2 + 20;
const TABLE_RX = () => Math.min(canvas.width / devicePixelRatio * 0.42, 460);
const TABLE_RY = () => Math.min(canvas.height / devicePixelRatio * 0.34, 260);

function playerPositions(gs) {
    if (!gs) return [];
    const n = gs.players.length;
    const cx = TABLE_CENTER_X();
    const cy = TABLE_CENTER_Y();
    const rx = TABLE_RX() + CARD_W + 20;
    const ry = TABLE_RY() + CARD_H / 2 + 10;
    const positions = [];
    for (let i = 0; i < n; i++) {
        // Arrange around an oval, starting from top, clockwise
        // Spread from angle PI (top) around
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
        const x = cx + rx * Math.cos(angle);
        const y = cy + ry * Math.sin(angle);
        positions.push({ x, y, angle });
    }
    return positions;
}

function drawTable() {
    const cx = TABLE_CENTER_X();
    const cy = TABLE_CENTER_Y();
    const rx = TABLE_RX();
    const ry = TABLE_RY();

    // Outer shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetY = 8;

    // Table border (wood)
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx + 18, ry + 18, 0, 0, Math.PI * 2);
    const woodGrad = ctx.createRadialGradient(cx - 50, cy - 30, rx * 0.3, cx, cy, rx + 18);
    woodGrad.addColorStop(0, '#5d4037');
    woodGrad.addColorStop(0.5, '#4e342e');
    woodGrad.addColorStop(1, '#3e2723');
    ctx.fillStyle = woodGrad;
    ctx.fill();
    ctx.restore();

    // Table felt
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    const feltGrad = ctx.createRadialGradient(cx - 30, cy - 50, rx * 0.1, cx, cy, rx);
    feltGrad.addColorStop(0, '#2e7d32');
    feltGrad.addColorStop(0.6, '#1b5e20');
    feltGrad.addColorStop(1, '#0d3b0f');
    ctx.fillStyle = feltGrad;
    ctx.fill();

    // Inner subtle ring
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx - 8, ry - 8, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 2;
    ctx.stroke();
}

function drawCard(x, y, w, h, card, faceUp = true, scale = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    // Card shadow
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;

    // Card background
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, CARD_R);
    ctx.fillStyle = faceUp ? '#fff' : '#1565c0';
    ctx.fill();
    ctx.shadowColor = 'transparent';

    // Card border
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, CARD_R);
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.stroke();

    if (!faceUp) {
        // Card back pattern
        ctx.beginPath();
        ctx.roundRect(4, 4, w - 8, h - 8, CARD_R - 2);
        ctx.strokeStyle = '#0d47a1';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Diamond pattern on back
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.moveTo(w / 2, 12);
        ctx.lineTo(w - 12, h / 2);
        ctx.lineTo(w / 2, h - 12);
        ctx.lineTo(12, h / 2);
        ctx.closePath();
        ctx.fill();
    } else if (card) {
        const rank = card.rank;
        const suit = card.suit;
        const color = SUIT_COLORS[suit] || '#000';
        const sym = SUIT_SYMBOLS[suit] || suit;

        // Rank + Suit top-left
        ctx.fillStyle = color;
        ctx.font = `bold ${Math.round(18)}px 'Segoe UI', sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText(rank, 6, 20);

        ctx.font = `${Math.round(14)}px 'Segoe UI', sans-serif`;
        ctx.fillText(sym, 6, 36);

        // Rank + Suit bottom-right
        ctx.textAlign = 'right';
        ctx.fillText(rank, w - 6, h - 16);
        ctx.font = `${Math.round(14)}px 'Segoe UI', sans-serif`;
        ctx.fillText(sym, w - 6, h - 4);

        // Center suit symbol
        ctx.textAlign = 'center';
        ctx.fillStyle = color;
        ctx.font = `${Math.round(28)}px 'Segoe UI', sans-serif`;
        ctx.fillText(sym, w / 2, h / 2 + 10);
    }

    ctx.restore();
}

function drawPlayerSeat(gs, pos, player, idx) {
    const { x, y } = pos;
    const isYou = player.is_you;
    const isCurrent = gs.current_player === idx;
    const isDealer = player.is_dealer;

    // Player panel background
    const panelW = 130, panelH = 60;
    const px = x - panelW / 2, py = y - panelH / 2;

    ctx.save();

    // Glow for current player
    if (isCurrent && !gs.hand_over) {
        ctx.shadowColor = 'rgba(201,168,76,0.7)';
        ctx.shadowBlur = 20;
    }

    ctx.beginPath();
    ctx.roundRect(px, py, panelW, panelH, 10);
    const panelGrad = ctx.createLinearGradient(px, py, px, py + panelH);
    panelGrad.addColorStop(0, isYou ? 'rgba(33,38,45,0.95)' : 'rgba(22,27,34,0.95)');
    panelGrad.addColorStop(1, 'rgba(13,17,23,0.95)');
    ctx.fillStyle = panelGrad;
    ctx.fill();

    ctx.restore();

    // Border
    ctx.beginPath();
    ctx.roundRect(px, py, panelW, panelH, 10);
    ctx.strokeStyle = isCurrent ? '#c9a84c' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isCurrent ? 2 : 1;
    ctx.stroke();

    // Dealer chip
    if (isDealer) {
        ctx.beginPath();
        ctx.arc(x + panelW / 2 - 18, py + 14, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('D', x + panelW / 2 - 18, py + 18);
    }

    // Name
    ctx.fillStyle = isYou ? '#c9a84c' : '#ccc';
    ctx.font = `bold ${isYou ? 13 : 12}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(player.name, x, py + 18);

    // Chips
    ctx.fillStyle = '#8b8';
    ctx.font = '11px monospace';
    ctx.fillText(`$${player.chips}`, x, py + 34);

    // Bet amount if any
    if (player.bet > 0) {
        ctx.fillStyle = '#f0c040';
        ctx.font = 'bold 11px monospace';
        ctx.fillText(`$${player.bet}`, x, py + 48);
    }

    // Folded overlay
    if (player.folded) {
        ctx.fillStyle = 'rgba(255,0,0,0.2)';
        ctx.beginPath();
        ctx.roundRect(px, py, panelW, panelH, 10);
        ctx.fill();
        ctx.fillStyle = '#f55';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('FOLDED', x, cy(py, panelH));
    }

    // All-in
    if (player.is_all_in) {
        ctx.fillStyle = '#f0c040';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('ALL IN', x, py + panelH + 14);
    }

    // Hole cards next to panel
    const hasCards = player.hole_cards && player.hole_cards.length > 0;
    const faceUp = isYou || gs.hand_over;
    const cardScale = 0.65;
    const offsetX = panelW / 2 + 8;
    const cardStartY = py + 4;

    if (hasCards) {
        for (let ci = 0; ci < player.hole_cards.length; ci++) {
            const cx2 = x + offsetX + ci * (CARD_W * cardScale + 4);
            const cy2 = cardStartY;
            drawCard(cx2, cy2, CARD_W, CARD_H, player.hole_cards[ci], faceUp, cardScale);
        }
    }

    // Best hand text at showdown
    if (gs.hand_over && player.best_hand && !player.folded) {
        ctx.fillStyle = '#aaa';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        const textY = cardStartY + CARD_H * cardScale + 14;
        ctx.fillText(player.best_hand, x + offsetX + CARD_W * cardScale / 2, textY);
    }
}

function cy(baseY, panelH) { return baseY + panelH / 2; }

function drawCommunityCards(gs) {
    const cx = TABLE_CENTER_X();
    const cy = TABLE_CENTER_Y();
    const cards = gs.community;
    const totalW = cards.length * (CARD_W + 8) - 8;
    const startX = cx - totalW / 2;
    const startY = cy - CARD_H / 2;

    for (let i = 0; i < cards.length; i++) {
        drawCard(startX + i * (CARD_W + 8), startY, CARD_W, CARD_H, cards[i], true);
    }
}

function drawPot(gs) {
    const cx = TABLE_CENTER_X();
    const cy = TABLE_CENTER_Y();
    const pot = gs.pot;

    if (pot > 0) {
        // Chip stack icon
        ctx.fillStyle = '#f0c040';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`$${pot}`, cx, cy - CARD_H / 2 - 16);

        // Chip stack
        for (let i = 0; i < Math.min(5, Math.ceil(pot / 10)); i++) {
            ctx.beginPath();
            ctx.ellipse(cx, cy - CARD_H / 2 - 30 - i * 3, 18, 6, 0, 0, Math.PI * 2);
            ctx.fillStyle = i % 2 === 0 ? '#e74c3c' : '#3498db';
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }
}

function drawWinnerInfo(gs) {
    if (!gs.winners || gs.winners.length === 0) return;
    const cx = TABLE_CENTER_X();
    const cy = TABLE_CENTER_Y();

    let yOff = cy + CARD_H / 2 + 20;
    for (const w of gs.winners) {
        const p = gs.players[w.player];
        ctx.fillStyle = '#c9a84c';
        ctx.font = 'bold 15px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`${p.name} wins $${w.amount} with ${w.hand}`, cx, yOff);
        yOff += 24;
    }
}

function render() {
    resize();
    ctx.clearRect(0, 0, canvas.width / devicePixelRatio, canvas.height / devicePixelRatio);

    const gs = gameState;
    if (!gs) {
        ctx.fillStyle = '#888';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Connecting to server...', TABLE_CENTER_X(), TABLE_CENTER_Y());
        return;
    }

    drawTable();
    drawPot(gs);
    drawCommunityCards(gs);
    drawWinnerInfo(gs);

    const positions = playerPositions(gs);
    for (let i = 0; i < gs.players.length; i++) {
        if (positions[i]) drawPlayerSeat(gs, positions[i], gs.players[i], i);
    }
}

window.addEventListener('resize', render);
window.addEventListener('load', () => { resize(); connect(); render(); });

// Ensure canvas resizes with window
new ResizeObserver(() => render()).observe(document.getElementById('canvas-container'));
</script>
</body>
</html>
