<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Table</title>
<style>
    :root {
        --bg: #0d1117;
        --gold: #c9a84c;
        --text: #e0e0e0;
        --btn-bg: #21262d;
        --btn-border: #30363d;
        --btn-hover: #2f3a4a;
        --accent: #58a6ff;
        --danger: #f85149;
        --success: #3fb950;
        --warning: #d2991d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: var(--bg);
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: var(--text);
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        user-select: none;
    }
    #canvas-container {
        flex: 1;
        position: relative;
        min-height: 0;
    }
    canvas { display: block; width: 100%; height: 100%; }
    #hud {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        border: 1px solid var(--gold);
        border-radius: 12px;
        padding: 8px 20px;
        display: flex;
        gap: 24px;
        font-size: 14px;
        backdrop-filter: blur(10px);
    }
    .hud-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .hud-label { color: #888; }
    .hud-value { color: var(--gold); font-weight: bold; font-size: 16px; }
    #controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        align-items: center;
        background: rgba(0,0,0,0.8);
        padding: 12px 20px;
        border-radius: 16px;
        border: 1px solid #333;
        backdrop-filter: blur(10px);
        z-index: 10;
    }
    #controls.hidden { display: none; }
    .btn {
        padding: 10px 22px;
        border-radius: 10px;
        border: 1px solid var(--btn-border);
        background: var(--btn-bg);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
    }
    .btn:hover { background: var(--btn-hover); border-color: #555; }
    .btn:active { transform: scale(0.96); }
    .btn-fold { color: var(--danger); border-color: var(--danger); }
    .btn-fold:hover { background: rgba(248,81,73,0.15); }
    .btn-check { color: var(--success); border-color: var(--success); }
    .btn-check:hover { background: rgba(63,185,80,0.15); }
    .btn-call { color: var(--accent); border-color: var(--accent); }
    .btn-call:hover { background: rgba(88,166,255,0.15); }
    .btn-raise { color: var(--accent); border-color: var(--accent); }
    .btn-raise:hover { background: rgba(88,166,255,0.15); }
    .btn-allin { color: var(--warning); border-color: var(--warning); }
    .btn-allin:hover { background: rgba(210,153,29,0.15); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #raise-input {
        width: 70px;
        padding: 10px 8px;
        border-radius: 10px;
        border: 1px solid var(--accent);
        background: var(--btn-bg);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        text-align: center;
        outline: none;
    }
    #new-hand-btn {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 36px;
        border-radius: 14px;
        border: 2px solid var(--gold);
        background: rgba(201,168,76,0.15);
        color: var(--gold);
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        display: none;
        backdrop-filter: blur(10px);
        transition: all 0.2s;
        z-index: 10;
    }
    #new-hand-btn:hover { background: rgba(201,168,76,0.3); }
    #new-hand-btn.show { display: block; }
    #status-text {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--gold);
        font-size: 18px;
        font-weight: 700;
        pointer-events: none;
    }
</style>
</head>
<body>
<div id="canvas-container">
    <canvas id="c"></canvas>
    <div id="hud">
        <div class="hud-item"><span class="hud-label">Phase</span><span class="hud-value" id="hud-phase">-</span></div>
        <div class="hud-item"><span class="hud-label">Pot</span><span class="hud-value" id="hud-pot">$0</span></div>
        <div class="hud-item"><span class="hud-label">Bet</span><span class="hud-value" id="hud-bet">$0</span></div>
    </div>
    <div id="controls" class="hidden">
        <button class="btn btn-fold" id="btn-fold">Fold</button>
        <button class="btn btn-check" id="btn-check">Check</button>
        <button class="btn btn-call" id="btn-call">Call</button>
        <button class="btn btn-raise" id="btn-raise">Raise</button>
        <input type="number" id="raise-input" value="" placeholder="Amt">
        <button class="btn btn-allin" id="btn-allin">All In</button>
    </div>
    <div id="status-text"></div>
    <button id="new-hand-btn">New Hand</button>
</div>

<script>
// ----- Polyfill: Canvas roundRect -----
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
        this.moveTo(x + r.tl, y);
        this.lineTo(x + w - r.tr, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
        this.lineTo(x + w, y + h - r.br);
        this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
        this.lineTo(x + r.bl, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
        this.lineTo(x, y + r.tl);
        this.quadraticCurveTo(x, y, x + r.tl, y);
        this.closePath();
    };
}

const CARD_W = 64, CARD_H = 92, CARD_R = 8;
const SUIT_SYM = { 'S': '\u2660', 'H': '\u2665', 'D': '\u2666', 'C': '\u2663' };
const SUIT_COL = { 'S': '#000', 'H': '#e74c3c', 'D': '#e74c3c', 'C': '#000' };

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let gameState = null;
let ws = null;
let connected = false;

// ----- Helpers -----
function W() { return canvas.width / devicePixelRatio; }
function H() { return canvas.height / devicePixelRatio; }
function CX() { return W() / 2; }
function CY() { return H() / 2 + 20; }

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    if (rect.width < 1 || rect.height < 1) return;
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(devicePixelRatio, devicePixelRatio);
}

// ----- WebSocket -----
function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    try {
        ws = new WebSocket(`${proto}//${location.host}/ws`);
        ws.onopen = () => {
            connected = true;
            console.log('WebSocket connected');
            setStatus('');
        };
        ws.onclose = () => {
            connected = false;
            gameState = null;
            setStatus('Disconnected. Reconnecting...');
            setTimeout(connect, 2000);
            render();
        };
        ws.onerror = () => {
            setStatus('Connection error');
        };
        ws.onmessage = (e) => {
            try {
                gameState = JSON.parse(e.data);
                console.log('State received:', gameState.phase);
                if (gameState.hand_over) {
                    document.getElementById('controls').classList.add('hidden');
                    document.getElementById('new-hand-btn').classList.add('show');
                }
                updateUI();
                render();
            } catch (err) {
                console.error('Parse error:', err);
            }
        };
    } catch (err) {
        console.error('WebSocket error:', err);
        setStatus('Failed to connect');
        setTimeout(connect, 2000);
    }
}

function sendMsg(msg) {
    if (ws && connected && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
    }
}

function setStatus(text) {
    document.getElementById('status-text').textContent = text;
}

function findYou(gs) {
    const p = gs.players.find(p => p.is_you);
    return p ? p.index : -1;
}

function sendAction(action, amount) {
    sendMsg({ action, amount: amount || 0 });
    document.getElementById('controls').classList.add('hidden');
    setStatus('Waiting...');
}

function updateUI() {
    const gs = gameState;
    if (!gs) return;

    document.getElementById('hud-phase').textContent = gs.phase.toUpperCase();
    document.getElementById('hud-pot').textContent = '$' + gs.pot;
    document.getElementById('hud-bet').textContent = '$' + gs.current_bet;

    const ctrl = document.getElementById('controls');
    const actions = gs.allowed_actions || [];
    const youIdx = findYou(gs);

    if (actions.length === 0 || gs.current_player !== youIdx || gs.hand_over) {
        ctrl.classList.add('hidden');
        if (gs.current_player !== youIdx && !gs.hand_over) {
            setStatus(`Waiting for: ${gs.players[gs.current_player]?.name || '...'}`);
        } else {
            setStatus('');
        }
    } else {
        setStatus('Your turn!');
        ctrl.classList.remove('hidden');
        const has = (a) => actions.includes(a);
        document.getElementById('btn-fold').style.display = has('fold') ? '' : 'none';
        document.getElementById('btn-check').style.display = has('check') ? '' : 'none';
        document.getElementById('btn-call').style.display = has('call') ? '' : 'none';
        document.getElementById('btn-raise').style.display = has('raise') ? '' : 'none';
        document.getElementById('raise-input').style.display = has('raise') ? '' : 'none';
        document.getElementById('btn-allin').style.display = has('allin') ? '' : 'none';

        if (has('call')) {
            const you = gs.players[youIdx];
            const callAmt = gs.current_bet - (you ? you.bet : 0);
            document.getElementById('btn-call').textContent = `Call $${callAmt}`;
        }
        if (has('check') && !has('call')) {
            document.getElementById('btn-check').textContent = 'Check';
        }
        if (has('raise') && !document.getElementById('raise-input').value) {
            document.getElementById('raise-input').value = gs.current_bet + (gs.min_raise || 0);
        }
    }

    if (gs.hand_over) setStatus('');
}

// ----- Button handlers -----
document.getElementById('btn-fold').addEventListener('click', () => sendAction('fold'));
document.getElementById('btn-check').addEventListener('click', () => sendAction('check'));
document.getElementById('btn-call').addEventListener('click', () => sendAction('call'));
document.getElementById('btn-raise').addEventListener('click', () => {
    const amt = parseInt(document.getElementById('raise-input').value) || 0;
    sendAction('raise', amt);
});
document.getElementById('btn-allin').addEventListener('click', () => sendAction('allin'));
document.getElementById('new-hand-btn').addEventListener('click', () => {
    sendMsg({ type: 'new_hand' });
    document.getElementById('new-hand-btn').classList.remove('show');
});

// ----- Drawing -----
function drawCard(x, y, w, h, card, faceUp = true, scale = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;

    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, CARD_R);
    ctx.fillStyle = faceUp ? '#fff' : '#1565c0';
    ctx.fill();
    ctx.shadowColor = 'transparent';

    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, CARD_R);
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 1;
    ctx.stroke();

    if (!faceUp) {
        ctx.beginPath();
        ctx.roundRect(4, 4, w - 8, h - 8, CARD_R - 2);
        ctx.strokeStyle = '#0d47a1';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.moveTo(w / 2, 12);
        ctx.lineTo(w - 12, h / 2);
        ctx.lineTo(w / 2, h - 12);
        ctx.lineTo(12, h / 2);
        ctx.closePath();
        ctx.fill();
    } else if (card) {
        const rank = card.rank;
        const suit = card.suit;
        const color = SUIT_COL[suit] || '#000';
        const sym = SUIT_SYM[suit] || suit;

        ctx.fillStyle = color;
        ctx.font = `bold ${Math.round(18)}px 'Segoe UI', sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText(rank, 6, 20);
        ctx.font = `${Math.round(14)}px 'Segoe UI', sans-serif`;
        ctx.fillText(sym, 6, 36);

        ctx.textAlign = 'right';
        ctx.fillText(rank, w - 6, h - 16);
        ctx.font = `${Math.round(14)}px 'Segoe UI', sans-serif`;
        ctx.fillText(sym, w - 6, h - 4);

        ctx.textAlign = 'center';
        ctx.font = `${Math.round(28)}px 'Segoe UI', sans-serif`;
        ctx.fillText(sym, w / 2, h / 2 + 10);
    }

    ctx.restore();
}

function drawTable() {
    const cx = CX(), cy = CY();
    const rx = Math.min(W() * 0.42, 460);
    const ry = Math.min(H() * 0.34, 260);

    // Wood border with shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetY = 8;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx + 16, ry + 16, 0, 0, Math.PI * 2);
    const wood = ctx.createRadialGradient(cx - 60, cy - 40, rx * 0.2, cx, cy, rx + 16);
    wood.addColorStop(0, '#5d4037');
    wood.addColorStop(0.4, '#4e342e');
    wood.addColorStop(1, '#3e2723');
    ctx.fillStyle = wood;
    ctx.fill();
    ctx.restore();

    // Green felt
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    const felt = ctx.createRadialGradient(cx - 30, cy - 50, rx * 0.1, cx, cy, rx);
    felt.addColorStop(0, '#2e7d32');
    felt.addColorStop(0.5, '#1b5e20');
    felt.addColorStop(1, '#0d3b0f');
    ctx.fillStyle = felt;
    ctx.fill();

    // Inner highlight ring
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx - 8, ry - 8, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 2;
    ctx.stroke();
}

function drawCommunityCards(gs) {
    const cx = CX(), cy = CY();
    const cards = gs.community || [];
    if (cards.length === 0) return;
    const totalW = cards.length * (CARD_W + 8) - 8;
    const sx = cx - totalW / 2;
    const sy = cy - CARD_H / 2;
    for (let i = 0; i < cards.length; i++) {
        drawCard(sx + i * (CARD_W + 8), sy, CARD_W, CARD_H, cards[i], true);
    }
}

function drawPot(gs) {
    const cx = CX(), cy = CY();
    const pot = gs.pot || 0;
    if (pot <= 0) return;

    ctx.fillStyle = '#f0c040';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`$${pot}`, cx, cy - CARD_H / 2 - 18);

    for (let i = 0; i < Math.min(5, Math.ceil(pot / 10)); i++) {
        ctx.beginPath();
        ctx.ellipse(cx, cy - CARD_H / 2 - 32 - i * 3, 16, 5, 0, 0, Math.PI * 2);
        ctx.fillStyle = i % 2 === 0 ? '#e74c3c' : '#3498db';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function getPlayerPositions(gs) {
    const n = gs.players.length;
    const cx = CX(), cy = CY();
    const rx = Math.min(W() * 0.42, 460) + CARD_W + 20;
    const ry = Math.min(H() * 0.34, 260) + CARD_H / 2 + 10;
    const pos = [];
    for (let i = 0; i < n; i++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
        pos.push({
            x: cx + rx * Math.cos(angle),
            y: cy + ry * Math.sin(angle)
        });
    }
    return pos;
}

function drawPlayerSeat(gs, pos, player, idx) {
    const { x, y } = pos;
    const isYou = player.is_you;
    const isCurrent = gs.current_player === idx && !gs.hand_over;
    const panelW = 135, panelH = 55;
    const px = x - panelW / 2, py = y - panelH / 2;

    // Glow for current player
    if (isCurrent) {
        ctx.shadowColor = 'rgba(201,168,76,0.6)';
        ctx.shadowBlur = 20;
    }

    // Panel background
    ctx.beginPath();
    ctx.roundRect(px, py, panelW, panelH, 10);
    const grad = ctx.createLinearGradient(px, py, px, py + panelH);
    grad.addColorStop(0, isYou ? 'rgba(33,38,45,0.95)' : 'rgba(22,27,34,0.9)');
    grad.addColorStop(1, 'rgba(13,17,23,0.9)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.shadowColor = 'transparent';

    // Border
    ctx.beginPath();
    ctx.roundRect(px, py, panelW, panelH, 10);
    ctx.strokeStyle = isCurrent ? '#c9a84c' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = isCurrent ? 2 : 1;
    ctx.stroke();

    // Dealer button
    if (player.is_dealer) {
        ctx.beginPath();
        ctx.arc(x + panelW / 2 - 16, py + 12, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('D', x + panelW / 2 - 16, py + 15);
    }

    // Name
    ctx.fillStyle = isYou ? '#c9a84c' : '#ccc';
    ctx.font = `bold ${isYou ? 13 : 11}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(player.name, x, py + 16);

    // Chips
    ctx.fillStyle = '#8b8';
    ctx.font = '10px monospace';
    ctx.fillText(`$${player.chips}`, x, py + 30);

    // Bet amount
    if (player.bet > 0) {
        ctx.fillStyle = '#f0c040';
        ctx.font = 'bold 10px monospace';
        ctx.fillText(`$${player.bet}`, x, py + 44);
    }

    // Folded
    if (player.folded) {
        ctx.fillStyle = 'rgba(255,50,50,0.2)';
        ctx.beginPath();
        ctx.roundRect(px, py, panelW, panelH, 10);
        ctx.fill();
        ctx.fillStyle = '#f55';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('FOLDED', x, py + panelH / 2 + 4);
    }

    // All-in label
    if (player.is_all_in) {
        ctx.fillStyle = '#f0c040';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('ALL IN', x, py + panelH + 12);
    }

    // Hole cards
    const hasCards = player.hole_cards && player.hole_cards.length > 0;
    const faceUp = isYou || gs.hand_over;
    const cardScale = 0.6;
    const cardStartX = x + panelW / 2 + 8;
    const cardStartY = py - 4;

    if (hasCards) {
        for (let ci = 0; ci < player.hole_cards.length; ci++) {
            const cx = cardStartX + ci * (CARD_W * cardScale + 3);
            drawCard(cx, cardStartY, CARD_W, CARD_H, player.hole_cards[ci], faceUp, cardScale);
        }
    }

    // Best hand at showdown
    if (gs.hand_over && player.best_hand && !player.folded) {
        ctx.fillStyle = '#999';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        const tx = cardStartX + CARD_W * cardScale / 2;
        const ty = cardStartY + CARD_H * cardScale + 12;
        ctx.fillText(player.best_hand, tx, ty);
    }
}

function drawWinners(gs) {
    if (!gs.winners || gs.winners.length === 0) return;
    const cx = CX(), cy = CY();
    let yOff = cy + CARD_H / 2 + 25;
    for (const w of gs.winners) {
        const p = gs.players[w.player];
        if (!p) continue;
        ctx.fillStyle = '#c9a84c';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`${p.name} wins $${w.amount}`, cx, yOff);
        yOff += 20;
        ctx.fillStyle = '#aaa';
        ctx.font = '12px sans-serif';
        ctx.fillText(w.hand, cx, yOff);
        yOff += 24;
    }
}

function render() {
    resize();
    if (W() < 1 || H() < 1) return;

    ctx.clearRect(0, 0, W(), H());

    if (!gameState) {
        ctx.fillStyle = '#888';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Connecting to server...', CX(), CY());
        return;
    }

    drawTable();
    drawPot(gameState);
    drawCommunityCards(gameState);
    drawWinners(gameState);

    const positions = getPlayerPositions(gameState);
    for (let i = 0; i < gameState.players.length; i++) {
        if (positions[i]) drawPlayerSeat(gameState, positions[i], gameState.players[i], i);
    }
}

// ----- Init -----
window.addEventListener('resize', render);
window.addEventListener('load', () => {
    resize();
    connect();
    render();
});

new ResizeObserver(() => render()).observe(document.getElementById('canvas-container'));
</script>
</body>
</html>
